# Stack local (Handoff §13). Projeto pessoal: roda na máquina do dono via
# `docker compose up`. Sem deploy em nuvem.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: planejador
      POSTGRES_USER: planejador
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planejador -d planejador"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # IA local do planejamento (Fase A). CPU primeiro (sem driver); para GPU AMD
  # depois: image ollama/ollama:rocm + devices [/dev/kfd,/dev/dri] + group_add
  # [video]. Baixar o modelo uma vez:
  #   docker compose exec ollama ollama pull qwen2.5:7b-instruct
  ollama:
    image: ollama/ollama
    # Mantém o modelo carregado na RAM indefinidamente (sem cold start entre
    # chamadas — o load de ~5 GB no CPU é o que estourava o timeout). Single-user
    # local: ok deixar residente.
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    # --reload: gunicorn reinicia ao mudar o código. Combinado com o volume
    # abaixo, mudanças no host refletem sem rebuild da imagem (dev local).
    command: gunicorn config.wsgi --bind 0.0.0.0:8000 --reload
    env_file: .env
    volumes:
      - .:/app  # código do host montado no container (dev); some no build de prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Soft: não bloqueia o web se a IA demorar a subir (a IA é opcional).
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery:
    build: .
    # Sem migrate/collectstatic no worker (evita corrida com o web): ignora o
    # entrypoint e sobe direto o Celery. Sem jobs reais no MVP — terreno
    # pronto (§13). depends_on garante db/redis saudáveis.
    entrypoint: []
    command: celery -A config worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app  # mesmo código do host (dev), evita worker com código defasado
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  pgdata: {}
  ollama_models: {}
