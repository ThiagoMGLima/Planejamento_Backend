# Stack local (Handoff §13). Projeto pessoal: roda na máquina do dono via
# `docker compose up`. Sem deploy em nuvem.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: planejador
      POSTGRES_USER: planejador
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planejador -d planejador"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    # --reload: gunicorn reinicia ao mudar o código. Combinado com o volume
    # abaixo, mudanças no host refletem sem rebuild da imagem (dev local).
    command: gunicorn config.wsgi --bind 0.0.0.0:8000 --reload
    env_file: .env
    volumes:
      - .:/app  # código do host montado no container (dev); some no build de prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery:
    build: .
    # Sem migrate/collectstatic no worker (evita corrida com o web): ignora o
    # entrypoint e sobe direto o Celery. Sem jobs reais no MVP — terreno
    # pronto (§13). depends_on garante db/redis saudáveis.
    entrypoint: []
    command: celery -A config worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app  # mesmo código do host (dev), evita worker com código defasado
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: {}
