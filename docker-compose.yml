# Stack local (Handoff §13). Projeto pessoal: roda na máquina do dono via
# `docker compose up`. Sem deploy em nuvem.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: planejador
      POSTGRES_USER: planejador
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planejador -d planejador"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # IA local do planejamento (Fase A) na GPU (RX 7600 / Navi 33 via ROCm).
  # Medido: CPU ~7 tok/s de geração → GPU dezenas de tok/s. O host só precisa do
  # driver amdgpu (kernel); o runtime ROCm vem na imagem. Baixar o modelo uma vez:
  #   docker compose exec ollama ollama pull qwen2.5:7b-instruct
  ollama:
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd # compute (ROCm/HSA)
      - /dev/dri # render nodes
    group_add:
      - video
      - "990" # gid do grupo 'render' no HOST (dono de /dev/kfd); nome não resolve na imagem
    # Mantém o modelo carregado na VRAM indefinidamente (sem cold start entre
    # chamadas — o reload de ~5 GB era o que estourava o timeout). Single-user
    # local: ok deixar residente.
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      # Navi 33 é gfx1102: o ROCm empacotado nem sempre traz kernels para ele —
      # o override usa os de gfx1100 (mesma família RDNA3), prática padrão.
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    # --reload: gunicorn reinicia ao mudar o código. Combinado com o volume
    # abaixo, mudanças no host refletem sem rebuild da imagem (dev local).
    command: gunicorn config.wsgi --bind 0.0.0.0:8000 --reload
    env_file: .env
    volumes:
      - .:/app  # código do host montado no container (dev); some no build de prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Soft: não bloqueia o web se a IA demorar a subir (a IA é opcional).
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery:
    build: .
    # Sem migrate/collectstatic no worker (evita corrida com o web): ignora o
    # entrypoint e sobe direto o Celery. Sem jobs reais no MVP — terreno
    # pronto (§13). depends_on garante db/redis saudáveis.
    entrypoint: []
    command: celery -A config worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app  # mesmo código do host (dev), evita worker com código defasado
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  # Servidor MCP (Marco C4): camada fina de ferramentas sobre a API HTTP —
  # torna o backend usável por qualquer runtime de agente (cliente MCP em
  # http://localhost:8765/mcp). Zero lógica própria, zero Django.
  mcp:
    build: ./mcp_server
    environment:
      API_BASE_URL: http://web:8000/api/v1
    ports:
      - "8765:8765"
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata: {}
  ollama_models: {}
