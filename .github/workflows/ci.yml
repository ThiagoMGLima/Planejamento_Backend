name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: planejador
          POSTGRES_USER: planejador
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planejador"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://planejador:dev@localhost:5432/planejador
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      # Sem Redis no CI: cache cai para locmem (ver config/settings.py) e o
      # Celery usa broker/resultado em memória — os testes eager armazenam o
      # resultado (task_store_eager_result) e não podem depender de redis://.
      REDIS_URL: ""
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Checar migrations pendentes
        run: python manage.py makemigrations --check --dry-run

      - name: Testes (pytest)
        run: pytest
